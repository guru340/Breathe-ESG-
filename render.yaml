services:
  - type: web
    name: breathe-esg-ingestion-review
    env: python
    buildCommand: pip install -r requirements.txt && cd frontend && npm install && npm run build && cd .. && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && gunicorn config.wsgi
    envVars:
      - key: DEBUG
        value: "0"
      - key: ALLOWED_HOSTS
        value: breathe-esg-ingestion-review.onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString

databases:
  - name: breathe-esg-db
    databaseName: breathe_esg
    user: breathe_esg
